pipeline:
  name: Lambda Canary Deploy
  identifier: lambda_canary_deploy
  projectIdentifier: parson
  orgIdentifier: sandbox
  description: |
    Deploys Spring Boot app to AWS Lambda using Canary strategy.
    - Deploys new Lambda version
    - Shifts traffic gradually via alias (10% -> 50% -> 100%)
    - Supports instant rollback
  tags:
    deployment-type: lambda
    strategy: canary
  stages:
    - stage:
        name: Deploy to Dev
        identifier: deploy_to_dev
        description: Canary deployment to Lambda
        type: Deployment
        spec:
          deploymentType: AwsLambda
          service:
            serviceRef: spring_boot_lambda
            serviceInputs:
              serviceDefinition:
                type: AwsLambda
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: lambda_dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: lambda_lambda_dev
          execution:
            steps:
              - step:
                  name: Lambda Deploy
                  identifier: lambda_deploy
                  type: AwsLambdaDeploy
                  timeout: 10m
                  spec: {}
              - step:
                  name: Shift Traffic 10
                  identifier: shift_traffic_10
                  type: AwsLambdaTrafficShift
                  timeout: 5m
                  spec:
                    trafficPercent: 10
                    trafficPercentage: 10
              - step:
                  name: Verify 10
                  identifier: verify_10
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Verifying canary at 10 percent..."
                          # Add health check or smoke test
                          sleep 30
                          echo "Canary looks healthy!"
                    executionTarget: {}
                    environmentVariables: []
                    outputVariables: []
              - step:
                  name: Shift Traffic 50
                  identifier: shift_traffic_50
                  type: AwsLambdaTrafficShift
                  timeout: 5m
                  spec:
                    trafficPercent: 50
                    trafficPercentage: 50
              - step:
                  name: Approval
                  identifier: approval
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |
                      Lambda canary deployment at 50 percent traffic.

                      Review metrics and logs before proceeding to 100 percent.

                      Approve to shift all traffic to new version.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
              - step:
                  name: Shift Traffic 100
                  identifier: shift_traffic_100
                  type: AwsLambdaTrafficShift
                  timeout: 5m
                  spec:
                    trafficPercent: 100
                    trafficPercentage: 100
            rollbackSteps:
              - step:
                  name: Lambda Rollback
                  identifier: lambda_rollback
                  type: AwsLambdaRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback