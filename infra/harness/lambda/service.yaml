service:
  name: spring-boot-lambda
  identifier: springbootlambda
  description: Spring Boot Hello World Lambda deployment
  serviceDefinition:
    type: AwsLambda
    spec:
      variables:
        - name: function_name
          type: String
          description: Lambda function name
          required: true
          value: spring-boot-hello-world
        - name: lambda_role_arn
          type: String
          description: IAM role ARN for Lambda execution
          required: true
          value: arn:aws:iam::759984737373:role/spring-boot-hello-world-lambda-role
      manifests:
        - manifest:
            identifier: lambdaFunctionDefinition
            type: AwsLambdaFunctionDefinition
            spec:
              store:
                type: Harness
                spec:
                  files:
                    - /infra/harness/lambda/function-definition.json
        - manifest:
            identifier: lambdaFunctionAliasDefinition
            type: AwsLambdaFunctionAliasDefinition
            spec:
              store:
                type: Harness
                spec:
                  files:
                    - /infra/harness/lambda/alias-definition.json
      artifacts:
        primary:
          primaryArtifactRef: <+input>
          sources:
            - identifier: springbootlambda
              spec:
                connectorRef: <+input>
                region: us-east-1
                imagePath: spring-boot-hello-world
                tag: <+pipeline.variables.image_tag>
              type: Ecr
